services:
  - type: web
    name: ecc-platform
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecc-postgres
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: AUTH_SECRET
        generateValue: true
      - key: CRON_SECRET
        generateValue: true

databases:
  - name: ecc-postgres
    plan: free
    databaseName: ecc_platform
    ipAllowList: []
